name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-backend:
    runs-on: ubuntu-latest

    services:
      arangodb:
        image: arangodb:3.12
        env:
          ARANGO_ROOT_PASSWORD: oris_secret
        ports:
          - 8529:8529

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 18.x
      uses: actions/setup-node@v4
      with:
        node-version: 18.x

    - name: Install dependencies
      working-directory: ./server
      run: npm install

    - name: Run Tests
      working-directory: ./server
      env:
        ARANGO_URL: http://localhost:8529
        ARANGO_DB: _system
        ARANGO_USER: root
        ARANGO_PASSWORD: oris_secret
        JWT_SECRET: ci_test_secret
      run: npm test

  test-frontend-build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 18.x
      uses: actions/setup-node@v4
      with:
        node-version: 18.x

    - name: Install dependencies
      run: npm install
      
    - name: Build Frontend
      run: npm run build
