# SQLite stack for ORIS (lightweight, no external DB service)
# Usage: docker compose -f docker-compose.sqlite.yml up -d

services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    #    ports:
    #      - "3001:3001"
    environment:
      - PORT=3001
      - DATABASE_URL=sqlite:///app/data/database.sqlite
    volumes:
      - oris_sqlite_data:/app/data
      - oris_uploads:/app/uploads
      - oris_avatars:/app/avatars
    healthcheck:
      test: [ "CMD-SHELL", "node -e \"require('./db').raw('SELECT 1').then(() => process.exit(0)).catch(() => process.exit(1))\"" ]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3456:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  oris_sqlite_data:
  oris_uploads:
  oris_avatars:
